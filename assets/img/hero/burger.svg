<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" role="img" aria-label="Illustrated smash burger">
  <defs>
    <radialGradient id="glow" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#FF4D14" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#FF4D14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bunTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8A94B"/>
      <stop offset="100%" stop-color="#C77F2C"/>
    </linearGradient>
    <linearGradient id="bunBot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D9922F"/>
      <stop offset="100%" stop-color="#B26E20"/>
    </linearGradient>
    <linearGradient id="patty" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A3418"/>
      <stop offset="100%" stop-color="#3A2110"/>
    </linearGradient>
  </defs>
  <circle cx="320" cy="300" r="250" fill="url(#glow)"/>
  <!-- bun top -->
  <path d="M120 210c0-92 82-150 200-150s200 58 200 150z" fill="url(#bunTop)"/>
  <ellipse cx="230" cy="120" rx="10" ry="6" fill="#F4D79A" opacity=".8"/>
  <ellipse cx="330" cy="102" rx="11" ry="6" fill="#F4D79A" opacity=".8"/>
  <ellipse cx="415" cy="128" rx="10" ry="6" fill="#F4D79A" opacity=".8"/>
  <ellipse cx="285" cy="150" rx="9" ry="5" fill="#F4D79A" opacity=".7"/>
  <ellipse cx="380" cy="160" rx="9" ry="5" fill="#F4D79A" opacity=".7"/>
  <!-- lettuce -->
  <path d="M110 214h420c-14 22-40 26-64 18-16 20-46 18-60 2-16 20-48 20-66 2-16 18-46 18-62-2-24 10-52 4-68-20z" fill="#3FA34D"/>
  <!-- cheese -->
  <path d="M128 236h384l-40 44H168z" fill="#FFB800"/>
  <path d="M175 280l-18 34M300 280l0 40M430 280l16 34" stroke="#F0A500" stroke-width="6" stroke-linecap="round"/>
  <!-- patty -->
  <rect x="132" y="286" width="376" height="60" rx="30" fill="url(#patty)"/>
  <!-- sauce drip -->
  <path d="M150 300c40 26 110 22 170 22s130 4 170-22c6 26-6 44-30 46-8 18-40 16-46-2-10 16-36 16-46 0-8 16-40 18-46 2-24-2-38-20-30-46z" fill="#C43A05" opacity=".55"/>
